services:
  - type: web
    name: p2p-payment-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        value: sqlite:///./data/app.db
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE
        sync: false
      - key: SESSION_HTTPS_ONLY
        value: "true"
